{% extends 'base.html' %}
{% block title %}Register - JTEvent{% endblock %}
{% block content %}
<div x-data="registerPage()" class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full glass rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold gradient-text mb-2">Create Account</h1>
            <p class="text-gray-600 dark:text-gray-400">Join JTEvent today</p>
        </div>
        <form @submit.prevent="register" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">First Name</label>
                    <input type="text" x-model="form.first_name" required
                           class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Last Name</label>
                    <input type="text" x-model="form.last_name" required
                           class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Username</label>
                <input type="text" x-model="form.username" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Email</label>
                <input type="email" x-model="form.email" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" x-model="form.password" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Confirm Password</label>
                <input type="password" x-model="form.password_confirm" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <button type="submit" :disabled="loading"
                    class="w-full px-6 py-3 gradient-bg text-white rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50">
                <span x-show="!loading">Create Account</span>
                <span x-show="loading">Creating...</span>
            </button>
        </form>
        <p class="text-center text-sm text-gray-600 dark:text-gray-400 mt-6">
            Already have an account? <a href="/login" class="text-primary-600 hover:text-primary-700 font-semibold">Sign in</a>
        </p>
    </div>
</div>
<script>
function registerPage() {
    return {
        loading: false,
        form: { email: '', username: '', first_name: '', last_name: '', password: '', password_confirm: '' },
        async register() {
            if (this.form.password !== this.form.password_confirm) {
                return showToast('Passwords do not match', 'error');
            }
            this.loading = true;
            try {
                const result = await api.post('/auth/register/', this.form);
                console.log('Registration response:', result);

                // Save tokens and user data
                TokenManager.setTokens(result.access, result.refresh);
                localStorage.setItem('user', JSON.stringify(result.user));

                if (window.Alpine && Alpine.store('auth')) {
                    Alpine.store('auth').setUser(result.user);
                }

                showToast('Account created successfully!', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } catch (error) {
                console.error('Registration error:', error);
                const message = error.message || 'Registration failed';
                showToast(message, 'error');
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
