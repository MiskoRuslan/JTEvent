{% extends 'base.html' %}
{% block title %}Login - JTEvent{% endblock %}
{% block content %}
<div x-data="loginPage()" class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full glass rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold gradient-text mb-2">Welcome Back</h1>
            <p class="text-gray-600 dark:text-gray-400">Sign in to your account</p>
        </div>
        <form @submit.prevent="login" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Email</label>
                <input type="email" x-model="form.email" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" x-model="form.password" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <button type="submit" :disabled="loading"
                    class="w-full px-6 py-3 gradient-bg text-white rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50">
                <span x-show="!loading">Sign In</span>
                <span x-show="loading">Signing in...</span>
            </button>
        </form>
        <div class="mt-6">
            <div class="relative">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300 dark:border-gray-600"></div></div>
                <div class="relative flex justify-center text-sm"><span class="px-2 glass">Or continue with</span></div>
            </div>

            <!-- Custom Google Sign-In Button -->
            <button @click="loginWithGoogle" type="button"
                    class="mt-4 w-full px-6 py-3 border border-gray-300 dark:border-gray-600 rounded-lg font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Sign in with Google</span>
            </button>
        </div>
        <p class="text-center text-sm text-gray-600 dark:text-gray-400 mt-6">
            Don't have an account? <a href="/register" class="text-primary-600 hover:text-primary-700 font-semibold">Sign up</a>
        </p>
    </div>
</div>
<script>
const GOOGLE_CLIENT_ID = '{{ GOOGLE_CLIENT_ID }}';
let googleInitialized = false;

// Handle Google credential callback
async function handleGoogleCredential(response) {
    console.log('=== Google OAuth Flow Started ===');
    console.log('Google credential received, length:', response.credential?.length);

    try {
        console.log('Sending credential to backend...');
        const result = await api.post('/auth/google/', { token: response.credential });
        console.log('Backend response:', result);

        // Backend returns { access, refresh, user }
        console.log('Tokens received from backend:', {
            hasAccess: !!result.access,
            hasRefresh: !!result.refresh,
            hasUser: !!result.user,
            accessLength: result.access?.length,
            refreshLength: result.refresh?.length
        });

        TokenManager.setTokens(result.access, result.refresh);
        localStorage.setItem('user', JSON.stringify(result.user));
        console.log('Tokens saved to localStorage');

        // Verify tokens were saved
        console.log('Verifying tokens in localStorage:', {
            accessToken: localStorage.getItem('access_token') ? 'saved' : 'MISSING',
            refreshToken: localStorage.getItem('refresh_token') ? 'saved' : 'MISSING',
            user: localStorage.getItem('user') ? 'saved' : 'MISSING'
        });

        if (window.Alpine && Alpine.store('auth')) {
            Alpine.store('auth').setUser(result.user);
            console.log('Alpine auth store updated');
        }

        showToast('Google login successful!', 'success');
        console.log('Redirecting to /dashboard in 2 seconds...');
        setTimeout(() => {
            console.log('Now redirecting...');
            window.location.href = '/dashboard';
        }, 2000);
    } catch (error) {
        console.error('Backend auth error:', error);
        showToast('Google login failed. Please try again.', 'error');
    }
}

// Initialize Google Identity Services
function initializeGoogleSignIn() {
    if (!GOOGLE_CLIENT_ID) {
        console.warn('Google Client ID not configured');
        return;
    }

    if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
        console.log('Google Identity Services not loaded yet');
        return;
    }

    try {
        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleGoogleCredential,
            auto_select: false,
            cancel_on_tap_outside: true,
            ux_mode: 'popup',
            context: 'signin'
        });

        googleInitialized = true;
        console.log('Google Sign-In initialized successfully');
    } catch (error) {
        console.error('Failed to initialize Google Sign-In:', error);
    }
}

function loginPage() {
    return {
        loading: false,
        form: { email: '', password: '' },
        init() {
            // Wait for Google SDK to load
            const checkAndInit = setInterval(() => {
                if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                    initializeGoogleSignIn();
                    clearInterval(checkAndInit);
                }
            }, 100);

            // Stop checking after 10 seconds
            setTimeout(() => {
                clearInterval(checkAndInit);
                if (!googleInitialized) {
                    console.error('Google Sign-In SDK failed to load');
                }
            }, 10000);
        },
        async login() {
            this.loading = true;
            try {
                await Alpine.store('auth').login(this.form.email, this.form.password);
                showToast('Login successful!', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } catch (error) {
                showToast('Login failed. Check credentials.', 'error');
            } finally {
                this.loading = false;
            }
        },
        loginWithGoogle() {
            if (!GOOGLE_CLIENT_ID) {
                showToast('Google OAuth not configured', 'error');
                return;
            }

            if (!googleInitialized) {
                showToast('Google Sign-In is loading... Please try again', 'warning');
                return;
            }

            // Clear any old tokens before starting OAuth flow
            console.log('Clearing old tokens before Google OAuth...');
            TokenManager.clearTokens();

            try {
                // Trigger Google One Tap prompt (will show as popup)
                google.accounts.id.prompt((notification) => {
                    console.log('Prompt notification:', notification);
                    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                        console.log('Prompt not displayed, showing manual flow');
                        // If One Tap doesn't show, could implement fallback here
                    }
                });
            } catch (error) {
                console.error('Error showing Google prompt:', error);
                showToast('Failed to show Google Sign-In', 'error');
            }
        }
    }
}
</script>
{% endblock %}
