{% extends 'base.html' %}
{% block title %}Edit Event - JTEvent{% endblock %}
{% block content %}
<div x-data="editEventPage()" class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div x-show="loading" class="glass rounded-2xl p-8 animate-pulse">
        <div class="bg-gray-300 dark:bg-gray-700 h-8 rounded mb-6"></div>
        <div class="space-y-4">
            <div class="bg-gray-300 dark:bg-gray-700 h-12 rounded"></div>
            <div class="bg-gray-300 dark:bg-gray-700 h-32 rounded"></div>
        </div>
    </div>

    <div x-show="!loading && event" x-cloak class="glass rounded-2xl p-8">
        <h1 class="text-3xl font-bold mb-6">Edit Event</h1>
        <form @submit.prevent="submitForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Event Title *</label>
                <input type="text" x-model="form.title" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Description *</label>
                <textarea x-model="form.description" required rows="6"
                          class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none"></textarea>
            </div>
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Date & Time *</label>
                    <input type="datetime-local" x-model="form.date" required
                           class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Category *</label>
                    <select x-model="form.category" required
                            class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                        <option value="">Select category</option>
                        <option value="conference">Conference</option>
                        <option value="workshop">Workshop</option>
                        <option value="seminar">Seminar</option>
                        <option value="meetup">Meetup</option>
                        <option value="webinar">Webinar</option>
                        <option value="social">Social</option>
                        <option value="sports">Sports</option>
                        <option value="music">Music</option>
                        <option value="arts">Arts</option>
                        <option value="tech">Tech</option>
                        <option value="business">Business</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Location *</label>
                <input type="text" x-model="form.location" required placeholder="Venue or virtual link"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Max Attendees</label>
                <input type="number" x-model="form.max_attendees" min="1" placeholder="Leave empty for unlimited"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Cover Image</label>
                <div x-show="event.cover_image" class="mb-2">
                    <img :src="event.cover_image" class="h-48 w-full object-cover rounded-lg" alt="Current cover">
                </div>
                <input type="file" @change="handleImageUpload" accept="image/*"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">Leave empty to keep current image</p>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Tags (comma-separated)</label>
                <input type="text" x-model="form.tags" placeholder="tech, networking, startup"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div class="flex items-center space-x-2">
                <input type="checkbox" x-model="form.is_published" id="published"
                       class="w-4 h-4 text-primary-600 rounded focus:ring-primary-500">
                <label for="published" class="text-sm font-semibold">Event is published</label>
            </div>
            <div class="flex space-x-4">
                <button type="submit" :disabled="submitting"
                        class="flex-1 px-6 py-3 gradient-bg text-white rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50">
                    <span x-show="!submitting">Save Changes</span>
                    <span x-show="submitting">Saving...</span>
                </button>
                <a :href="'/events/' + eventId"
                   class="px-6 py-3 border border-gray-300 dark:border-gray-600 rounded-lg font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
<script>
function editEventPage() {
    return {
        loading: true,
        submitting: false,
        eventId: null,
        event: null,
        form: {
            title: '',
            description: '',
            date: '',
            location: '',
            category: '',
            max_attendees: '',
            tags: '',
            is_published: true
        },
        newCoverImage: null,
        async init() {
            this.eventId = window.location.pathname.split('/')[2];
            await this.loadEvent();
        },
        async loadEvent() {
            try {
                this.event = await api.get(`/events/${this.eventId}/`);

                // Populate form with existing data
                this.form = {
                    title: this.event.title,
                    description: this.event.description,
                    date: this.formatDateForInput(this.event.date),
                    location: this.event.location,
                    category: this.event.category,
                    max_attendees: this.event.max_attendees || '',
                    tags: this.event.tags || '',
                    is_published: this.event.is_published
                };
            } catch (error) {
                console.error('Failed to load event:', error);
                showToast('Failed to load event', 'error');
                setTimeout(() => window.location.href = '/dashboard', 1500);
            } finally {
                this.loading = false;
            }
        },
        handleImageUpload(event) {
            this.newCoverImage = event.target.files[0];
        },
        async submitForm() {
            this.submitting = true;
            try {
                const formData = new FormData();
                Object.keys(this.form).forEach(key => {
                    if (this.form[key] !== null && this.form[key] !== '') {
                        formData.append(key, this.form[key]);
                    }
                });
                if (this.newCoverImage) {
                    formData.append('cover_image', this.newCoverImage);
                }

                await api.put(`/events/${this.eventId}/`, formData, true);
                showToast('Event updated successfully!', 'success');
                setTimeout(() => window.location.href = '/events/' + this.eventId, 1000);
            } catch (error) {
                console.error('Failed to update event:', error);
                showToast('Failed to update event', 'error');
            } finally {
                this.submitting = false;
            }
        },
        formatDateForInput(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }
    }
}
</script>
{% endblock %}
