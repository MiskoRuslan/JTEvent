{% extends 'base.html' %}

{% block title %}Browse Events - JTEvent{% endblock %}

{% block content %}
<div x-data="eventsListPage()" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-4xl font-bold mb-2">Discover Events</h1>
        <p class="text-gray-600 dark:text-gray-400">Find the perfect event for you</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Filters Sidebar -->
        <aside class="lg:w-64 flex-shrink-0">
            <div class="glass rounded-2xl p-6 sticky top-24">
                <h2 class="text-xl font-bold mb-4">Filters</h2>

                <!-- Search -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Search</label>
                    <input type="text" x-model="filters.search" @input="applyFilters"
                           placeholder="Search events..."
                           class="w-full px-4 py-2 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>

                <!-- Category -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Category</label>
                    <select x-model="filters.category" @change="applyFilters"
                            class="w-full px-4 py-2 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                        <option value="">All Categories</option>
                        <option value="conference">Conference</option>
                        <option value="workshop">Workshop</option>
                        <option value="seminar">Seminar</option>
                        <option value="meetup">Meetup</option>
                        <option value="webinar">Webinar</option>
                        <option value="social">Social</option>
                        <option value="sports">Sports</option>
                        <option value="music">Music</option>
                        <option value="arts">Arts</option>
                        <option value="tech">Tech</option>
                        <option value="business">Business</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <!-- Date Range -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Date From</label>
                    <input type="date" x-model="filters.date_from" @change="applyFilters"
                           class="w-full px-4 py-2 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Date To</label>
                    <input type="date" x-model="filters.date_to" @change="applyFilters"
                           class="w-full px-4 py-2 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>

                <!-- Sort -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Sort By</label>
                    <select x-model="filters.ordering" @change="applyFilters"
                            class="w-full px-4 py-2 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                        <option value="-date">Date (Newest)</option>
                        <option value="date">Date (Oldest)</option>
                        <option value="-created_at">Recently Added</option>
                        <option value="title">Title (A-Z)</option>
                        <option value="-title">Title (Z-A)</option>
                    </select>
                </div>

                <button @click="resetFilters"
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                    Reset Filters
                </button>
            </div>
        </aside>

        <!-- Events Grid -->
        <div class="flex-1">
            <!-- Loading State -->
            <div x-show="loading" class="grid md:grid-cols-2 gap-6">
                <template x-for="i in 6" :key="i">
                    <div class="glass rounded-2xl p-6 animate-pulse">
                        <div class="bg-gray-300 dark:bg-gray-700 h-48 rounded-xl mb-4"></div>
                        <div class="bg-gray-300 dark:bg-gray-700 h-6 rounded mb-2"></div>
                        <div class="bg-gray-300 dark:bg-gray-700 h-4 rounded w-2/3"></div>
                    </div>
                </template>
            </div>

            <!-- Events Grid -->
            <div x-show="!loading && events.length > 0" class="grid md:grid-cols-2 gap-6">
                <template x-for="event in events" :key="event.id">
                    <a :href="'/events/' + event.id"
                       class="glass rounded-2xl overflow-hidden hover:scale-105 transition-transform duration-300">
                        <div class="relative h-48 overflow-hidden">
                            <img :src="event.cover_image_url"
                                 class="w-full h-full object-cover"
                                 :alt="event.title">
                            <div class="absolute top-4 right-4">
                                <span class="px-3 py-1 glass rounded-full text-sm font-semibold text-white capitalize"
                                      x-text="event.category"></span>
                            </div>
                            <div x-show="event.is_full" class="absolute top-4 left-4">
                                <span class="px-3 py-1 bg-red-500 rounded-full text-sm font-semibold text-white">
                                    Full
                                </span>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-bold mb-2" x-text="event.title"></h3>
                            <div class="space-y-2 text-sm text-gray-600 dark:text-gray-400">
                                <div class="flex items-center space-x-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    <span x-text="formatDate(event.date)"></span>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    </svg>
                                    <span x-text="event.location"></span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                                        </svg>
                                        <span x-text="event.attendees_count + ' attending'"></span>
                                    </div>
                                    <span x-show="event.max_attendees"
                                          class="text-xs text-gray-500"
                                          x-text="'/ ' + event.max_attendees + ' max'"></span>
                                </div>
                            </div>
                        </div>
                    </a>
                </template>
            </div>

            <!-- Empty State -->
            <div x-show="!loading && events.length === 0" class="text-center py-20 glass rounded-2xl">
                <svg class="w-24 h-24 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <h3 class="text-xl font-semibold mb-2">No events found</h3>
                <p class="text-gray-600 dark:text-gray-400 mb-4">Try adjusting your filters</p>
                <button @click="resetFilters"
                        class="inline-block px-6 py-3 gradient-bg text-white rounded-lg font-semibold hover:opacity-90 transition">
                    Reset Filters
                </button>
            </div>

            <!-- Pagination -->
            <div x-show="!loading && totalPages > 1" class="mt-8 flex justify-center items-center space-x-2">
                <button @click="goToPage(currentPage - 1)" :disabled="currentPage === 1"
                        class="px-4 py-2 glass rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                    Previous
                </button>
                <template x-for="page in visiblePages" :key="page">
                    <button @click="goToPage(page)"
                            :class="{ 'gradient-bg text-white': page === currentPage, 'glass': page !== currentPage }"
                            class="px-4 py-2 rounded-lg hover:opacity-90 transition"
                            x-text="page"></button>
                </template>
                <button @click="goToPage(currentPage + 1)" :disabled="currentPage === totalPages"
                        class="px-4 py-2 glass rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                    Next
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function eventsListPage() {
    return {
        loading: true,
        events: [],
        filters: {
            search: '',
            category: '',
            date_from: '',
            date_to: '',
            ordering: '-date'
        },
        currentPage: 1,
        totalPages: 1,
        totalCount: 0,

        async init() {
            const params = new URLSearchParams(window.location.search);
            this.filters.search = params.get('search') || '';
            this.filters.category = params.get('category') || '';
            await this.loadEvents();
        },

        async loadEvents() {
            try {
                this.loading = true;
                const params = new URLSearchParams();
                Object.keys(this.filters).forEach(key => {
                    if (this.filters[key]) params.append(key, this.filters[key]);
                });
                params.append('page', this.currentPage);

                const data = await api.get('/events/?' + params.toString());
                this.events = data.results || data;
                this.totalCount = data.count || this.events.length;
                this.totalPages = Math.ceil(this.totalCount / 10);
            } catch (error) {
                console.error('Failed to load events:', error);
            } finally {
                this.loading = false;
            }
        },

        applyFilters() {
            this.currentPage = 1;
            this.loadEvents();
        },

        resetFilters() {
            this.filters = {
                search: '',
                category: '',
                date_from: '',
                date_to: '',
                ordering: '-date'
            };
            this.applyFilters();
        },

        goToPage(page) {
            if (page >= 1 && page <= this.totalPages) {
                this.currentPage = page;
                this.loadEvents();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        },

        get visiblePages() {
            const pages = [];
            const start = Math.max(1, this.currentPage - 2);
            const end = Math.min(this.totalPages, start + 4);
            for (let i = start; i <= end; i++) {
                pages.push(i);
            }
            return pages;
        },

        formatDate(date) {
            return new Date(date).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }
    }
}
</script>
{% endblock %}
