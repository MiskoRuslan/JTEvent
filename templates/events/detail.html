{% extends 'base.html' %}
{% block title %}{{ event.title }} - JTEvent{% endblock %}
{% block content %}
<div x-data="eventDetailPage()" class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div x-show="loading" class="animate-pulse glass rounded-2xl p-8 mb-6">
        <div class="bg-gray-300 dark:bg-gray-700 h-64 rounded-xl mb-4"></div>
        <div class="bg-gray-300 dark:bg-gray-700 h-8 rounded mb-2"></div>
    </div>

    <div x-show="!loading && event" x-cloak>
        <div class="glass rounded-2xl overflow-hidden mb-6">
            <div class="relative h-96 overflow-hidden">
                <img :src="event.cover_image_url"
                     class="w-full h-full object-cover" :alt="event.title">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                <div class="absolute bottom-8 left-8 right-8">
                    <span class="px-3 py-1 glass rounded-full text-sm font-semibold text-white capitalize mb-4 inline-block"
                          x-text="event.category"></span>
                    <h1 class="text-4xl md:text-5xl font-bold text-white mb-4" x-text="event.title"></h1>
                    <div class="flex items-center space-x-2 text-white/90">
                        <img :src="event.organizer?.avatar || 'https://ui-avatars.com/api/?name=' + (event.organizer?.first_name || 'Organizer')"
                             class="w-10 h-10 rounded-full" alt="Organizer">
                        <span x-text="event.organizer?.full_name"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-6">
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-2xl font-bold mb-4">About Event</h2>
                    <p class="text-gray-600 dark:text-gray-300 whitespace-pre-line" x-text="event.description"></p>
                </div>

                <div class="glass rounded-2xl p-6" x-show="event.tags">
                    <h3 class="font-semibold mb-3">Tags</h3>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="tag in event.tags_list" :key="tag">
                            <span class="px-3 py-1 bg-primary-100 dark:bg-primary-900 text-primary-800 dark:text-primary-200 rounded-full text-sm" x-text="tag"></span>
                        </template>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass rounded-2xl p-6">
                    <h3 class="font-bold mb-4">Event Details</h3>
                    <div class="space-y-4">
                        <div class="flex items-start space-x-3">
                            <svg class="w-5 h-5 mt-0.5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <div>
                                <div class="font-semibold" x-text="formatDate(event.date)"></div>
                                <div class="text-sm text-gray-600 dark:text-gray-400" x-text="formatTime(event.date)"></div>
                            </div>
                        </div>
                        <div class="flex items-start space-x-3">
                            <svg class="w-5 h-5 mt-0.5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            </svg>
                            <div class="font-semibold" x-text="event.location"></div>
                        </div>
                        <div class="flex items-start space-x-3">
                            <svg class="w-5 h-5 mt-0.5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                            <div>
                                <div class="font-semibold" x-text="event.attendees_count + ' Attending'"></div>
                                <div x-show="event.available_spots !== null" class="text-sm text-gray-600 dark:text-gray-400">
                                    <span x-text="event.available_spots"></span> spots left
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button x-show="$store.auth.isAuthenticated && !event.is_registered && !event.is_full"
                        @click="registerForEvent"
                        class="w-full px-6 py-3 gradient-bg text-white rounded-lg font-semibold hover:opacity-90 transition">
                    Register for Event
                </button>
                <button x-show="$store.auth.isAuthenticated && event.is_registered"
                        @click="unregisterFromEvent"
                        class="w-full px-6 py-3 border-2 border-red-500 text-red-500 rounded-lg font-semibold hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    Cancel Registration
                </button>
                <div x-show="event.is_full && !event.is_registered"
                     class="w-full px-6 py-3 bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400 rounded-lg font-semibold text-center">
                    Event Full
                </div>
                <a x-show="!$store.auth.isAuthenticated" href="/login"
                   class="block w-full px-6 py-3 gradient-bg text-white rounded-lg font-semibold text-center hover:opacity-90 transition">
                    Login to Register
                </a>
            </div>
        </div>
    </div>
</div>
<script>
function eventDetailPage() {
    return {
        loading: true,
        event: null,
        async init() {
            const eventId = window.location.pathname.split('/')[2];
            await this.loadEvent(eventId);
        },
        async loadEvent(id) {
            try {
                this.event = await api.get(`/events/${id}/`);
            } catch (error) {
                console.error('Failed to load event:', error);
                showToast('Failed to load event', 'error');
            } finally {
                this.loading = false;
            }
        },
        async registerForEvent() {
            try {
                await api.post(`/events/${this.event.id}/register/`);
                this.event.is_registered = true;
                this.event.attendees_count++;
                if (this.event.available_spots !== null) this.event.available_spots--;
                showToast('Successfully registered!', 'success');
            } catch (error) {
                showToast('Registration failed', 'error');
            }
        },
        async unregisterFromEvent() {
            try {
                await api.delete(`/events/${this.event.id}/unregister/`);
                this.event.is_registered = false;
                this.event.attendees_count--;
                if (this.event.available_spots !== null) this.event.available_spots++;
                showToast('Registration cancelled', 'info');
            } catch (error) {
                showToast('Failed to cancel', 'error');
            }
        },
        formatDate(date) {
            return new Date(date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        },
        formatTime(date) {
            return new Date(date).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }
    }
}
</script>
{% endblock %}
