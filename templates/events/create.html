{% extends 'base.html' %}
{% block title %}Create Event - JTEvent{% endblock %}
{% block content %}
<div x-data="createEventPage()" class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="glass rounded-2xl p-8">
        <h1 class="text-3xl font-bold mb-6">Create New Event</h1>
        <form @submit.prevent="submitForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Event Title *</label>
                <input type="text" x-model="form.title" required
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Description *</label>
                <textarea x-model="form.description" required rows="6"
                          class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none"></textarea>
            </div>
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Date & Time *</label>
                    <input type="datetime-local" x-model="form.date" required
                           class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Category *</label>
                    <div x-data="{ open: false }" class="relative">
                        <button type="button" @click="open = !open" @click.away="open = false"
                                class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none text-left flex justify-between items-center">
                            <span x-text="form.category ? categories.find(c => c.value === form.category)?.label : 'Select category'"
                                  :class="{ 'text-gray-400': !form.category }"></span>
                            <svg class="w-5 h-5 transition-transform" :class="{ 'rotate-180': open }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <div x-show="open" x-cloak
                             class="absolute z-10 w-full mt-2 glass rounded-lg shadow-lg max-h-60 overflow-y-auto">
                            <template x-for="category in categories" :key="category.value">
                                <button type="button" @click="form.category = category.value; open = false"
                                        class="w-full px-4 py-3 text-left hover:bg-primary-500/20 transition first:rounded-t-lg last:rounded-b-lg"
                                        :class="{ 'bg-primary-500/10': form.category === category.value }">
                                    <span x-text="category.label"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Location *</label>
                <input type="text" x-model="form.location" required placeholder="Venue or virtual link"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Max Attendees</label>
                <input type="number" x-model="form.max_attendees" min="1" placeholder="Leave empty for unlimited"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Cover Image</label>
                <input type="file" @change="handleImageUpload" accept="image/*"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Tags (comma-separated)</label>
                <input type="text" x-model="form.tags" placeholder="tech, networking, startup"
                       class="w-full px-4 py-3 glass rounded-lg focus:ring-2 focus:ring-primary-500 focus:outline-none">
            </div>
            <div class="flex items-center space-x-2">
                <input type="checkbox" x-model="form.is_published" id="published"
                       class="w-4 h-4 text-primary-600 rounded focus:ring-primary-500">
                <label for="published" class="text-sm font-semibold">Publish event immediately</label>
            </div>
            <div class="flex space-x-4">
                <button type="submit" :disabled="loading"
                        class="flex-1 px-6 py-3 gradient-bg text-white rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50">
                    <span x-show="!loading">Create Event</span>
                    <span x-show="loading">Creating...</span>
                </button>
                <a href="/events"
                   class="px-6 py-3 border border-gray-300 dark:border-gray-600 rounded-lg font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
<script>
function createEventPage() {
    return {
        loading: false,
        categories: [
            { value: 'conference', label: 'Conference' },
            { value: 'workshop', label: 'Workshop' },
            { value: 'seminar', label: 'Seminar' },
            { value: 'meetup', label: 'Meetup' },
            { value: 'webinar', label: 'Webinar' },
            { value: 'social', label: 'Social' },
            { value: 'sports', label: 'Sports' },
            { value: 'music', label: 'Music' },
            { value: 'arts', label: 'Arts' },
            { value: 'tech', label: 'Tech' },
            { value: 'business', label: 'Business' },
            { value: 'other', label: 'Other' }
        ],
        form: {
            title: '',
            description: '',
            date: '',
            location: '',
            category: '',
            max_attendees: '',
            tags: '',
            is_published: true
        },
        coverImage: null,
        handleImageUpload(event) {
            this.coverImage = event.target.files[0];
        },
        async submitForm() {
            this.loading = true;
            try {
                const formData = new FormData();

                Object.keys(this.form).forEach(key => {
                    if (this.form[key]) {
                        // Convert datetime-local format to ISO format with timezone
                        if (key === 'date') {
                            const localDate = new Date(this.form[key]);
                            const isoDate = localDate.toISOString();
                            console.log('Converting date:', this.form[key], '->', isoDate);
                            formData.append(key, isoDate);
                        } else {
                            formData.append(key, this.form[key]);
                        }
                    }
                });

                if (this.coverImage) {
                    formData.append('cover_image', this.coverImage);
                }

                console.log('Submitting event with data:', {
                    title: this.form.title,
                    date: formData.get('date'),
                    category: this.form.category
                });

                const event = await api.post('/events/', formData, true);
                showToast('Event created successfully!', 'success');
                setTimeout(() => window.location.href = '/events/' + event.id, 1000);
            } catch (error) {
                console.error('Event creation error:', error);
                showToast('Failed to create event: ' + error.message, 'error');
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
