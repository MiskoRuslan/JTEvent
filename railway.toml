[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn event_management.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
DJANGO_SETTINGS_MODULE = "event_management.settings.production"
PYTHONUNBUFFERED = "1"
