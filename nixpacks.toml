[phases.setup]
nixPkgs = ["python312", "postgresql", "gcc", "libpq"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput --clear"
]

[start]
cmd = "python manage.py migrate --noinput && gunicorn event_management.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120"

[variables]
PYTHONUNBUFFERED = "1"
DJANGO_SETTINGS_MODULE = "event_management.settings.production"
